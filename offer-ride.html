<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offer a Ride - Womshare</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-100">

    <!-- Header -->
    <div class="bg-purple-600 text-white p-4 flex justify-between">
        <h1 class="text-lg font-bold">Womshare</h1>
        <a href="index.html">← Back to Home</a>
    </div>

    <!-- Form -->
    <div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded-lg shadow">

        <h2 class="text-2xl font-bold mb-6 text-center">Offer a Ride</h2>

        <form>

            <input type="text" placeholder="Driver Name" class="w-full border p-3 mb-4 rounded">

            <input type="text" placeholder="Car Model" class="w-full border p-3 mb-4 rounded">

            <input type="text" placeholder="Start Location (Ghaziabad)" class="w-full border p-3 mb-4 rounded">

            <input type="text" placeholder="Destination (Noida Sector 62 / 63)" class="w-full border p-3 mb-4 rounded">

            <input type="time" class="w-full border p-3 mb-4 rounded">

            <input type="number" placeholder="Available Seats" class="w-full border p-3 mb-4 rounded">

            <input type="number" placeholder="Price per Seat ₹" class="w-full border p-3 mb-4 rounded">

            <button class="w-full bg-purple-600 text-white p-3 rounded hover:bg-purple-700">
                Post Ride
            </button>

        </form>

    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Dashboard | Womshare</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="p-4 bg-white border-b flex justify-between items-center">
        <h1 class="text-xl font-bold text-purple-700">Womshare</h1>
        <div class="flex items-center gap-4">
            <span class="text-gray-600">Hi, Neha!</span>
            <div class="w-10 h-10 bg-purple-100 rounded-full"></div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto py-10 px-4">
        <h2 class="text-3xl font-bold mb-8">Your Activity</h2>
        
        <div class="flex border-b border-gray-200 mb-8">
            <button class="px-6 py-3 border-b-2 border-purple-600 text-purple-600 font-semibold">Upcoming Rides</button>
            <button class="px-6 py-3 text-gray-500 hover:text-purple-600 transition">History</button>
            <button class="px-6 py-3 text-gray-500 hover:text-purple-600 transition">My Listings</button>
        </div>

        <div class="space-y-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center">
                <div>
                    <span class="text-xs font-bold text-teal-600 bg-teal-50 px-2 py-1 rounded">TOMORROW 09:00 AM</span>
                    <h3 class="text-lg font-bold mt-2">Ghaziabad → Noida Sec 62</h3>
                    <p class="text-gray-500">Driver: Priya Mehta • Maruti Baleno</p>
                </div>
                <div class="text-right">
                    <p class="text-2xl font-bold text-gray-800">₹45</p>
                    <button class="text-purple-600 text-sm font-semibold underline">View Details</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>

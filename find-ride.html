<section class="pt-24 pb-12 bg-gradient-soft min-h-screen">
    <div class="max-w-4xl mx-auto px-4">
        <div class="bg-white p-8 rounded-3xl shadow-xl mb-12" data-aos="fade-up">
            <h2 class="text-2xl font-bold mb-6 text-purple-800">Where are you heading?</h2>
            <form id="searchForm" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">Pickup</label>
                    <select id="pickup" class="w-full p-3 border border-purple-100 rounded-xl focus:ring-2 focus:ring-purple-400 outline-none">
                        <option value="Ghaziabad">Ghaziabad</option>
                        <option value="Noida Sector 62">Noida Sector 62</option>
                        <option value="Noida Sector 63">Noida Sector 63</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">Destination</label>
                    <select id="destination" class="w-full p-3 border border-purple-100 rounded-xl focus:ring-2 focus:ring-purple-400 outline-none">
                        <option value="Noida Sector 62">Noida Sector 62</option>
                        <option value="Noida Sector 63">Noida Sector 63</option>
                        <option value="Ghaziabad">Ghaziabad</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button type="submit" class="w-full bg-purple-600 text-white py-3 rounded-xl font-bold hover:bg-purple-700 transition">Search Rides</button>
                </div>
            </form>
        </div>

        <div id="resultsGrid" class="grid grid-cols-1 gap-6">
            </div>
    </div>
</section>

<script type="module">
    import { searchRides } from './js/firestore.js';
    
    document.getElementById('searchForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const start = document.getElementById('pickup').value;
        const end = document.getElementById('destination').value;
        const rides = await searchRides(start, end);
        renderRides(rides);
    });

    function renderRides(rides) {
        const grid = document.getElementById('resultsGrid');
        grid.innerHTML = rides.map(ride => `
            <div class="ride-card bg-white p-6 rounded-2xl flex flex-col md:flex-row items-center gap-6 border border-purple-50">
                <img src="${ride.driver_img}" class="w-20 h-20 rounded-full object-cover border-2 border-purple-200">
                <div class="flex-grow">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-lg">${ride.driver_name}</h3>
                            <p class="text-sm text-gray-500">${ride.car_model} • ${ride.vehicle_no}</p>
                        </div>
                        <span class="text-2xl font-bold text-purple-600">₹${ride.price_per_seat}</span>
                    </div>
                    <div class="mt-4 flex gap-4 text-sm text-gray-600">
                        <span>🕒 ${ride.departure_time}</span>
                        <span>💺 ${ride.seats_available} seats left</span>
                    </div>
                </div>
                <button onclick="window.location.href='ride-details.html?id=${ride.id}'" class="bg-teal-500 text-white px-6 py-2 rounded-lg font-semibold hover:bg-teal-600 transition">View Details</button>
            </div>
        `).join('');
    }
</script>
